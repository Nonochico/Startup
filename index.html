<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakTRP – La référence sneakers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="#">Sneak<span>TRP</span></a>
            </div>
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="burger">
                <i class="fas fa-bars"></i>
            </label>
            <nav class="navbar">
                <ul class="nav-links">
                    <li><a href="#">Nouveautés</a></li>
                    <li><a href="#">Homme</a></li>
                    <li><a href="#">Femme</a></li>
                    <li><a href="#">Enfant</a></li>
                    <li><a href="#">Marques</a></li>
                    <li><a href="#">Soldes</a></li>
                </ul>
            </nav>
            <div class="nav-icons">
                <i class="fas fa-search"></i>
                <i class="fas fa-user"></i>
                <i class="fas fa-shopping-bag"></i>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1>Exclusivité SneakTRP</h1>
            <p>Découvrez la nouvelle collection limitée</p>
            <a href="#" class="btn">Shop Now</a>
        </div>
    </section>

    <!-- Filtres -->
    <section class="filters">
        <div class="container">
            <div class="filter-options">
                <a href="#all" class="filter-btn active">Tous</a>
                <a href="#homme" class="filter-btn">Homme</a>
                <a href="#femme" class="filter-btn">Femme</a>
                <a href="#enfant" class="filter-btn">Enfant</a>
                <a href="#solde" class="filter-btn">Soldes</a>
            </div>
        </div>
    </section>

    <!-- Produits -->
    <section class="products">
        <div class="container">
            <h2 class="section-title">Nos meilleures ventes</h2>
            <div class="products-grid">
                <!-- Exemple de produit -->
                <div class="product-card homme" id="homme">
                    <div class="product-img">
                        <img src="https://via.placeholder.com/300/000000/FFFFFF?text=Nike+Air+Max" alt="Nike Air Max">
                        <span class="product-badge">Nouveau</span>
                    </div>
                    <div class="product-info">
                        <h3>Nike Air Max 2090</h3>
